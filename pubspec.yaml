name: second_trip_project
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # 상태 관리
  flutter_riverpod: ^2.5.1
  # HTTP 통신
  dio: ^5.4.3
  # 화면 라우팅
  go_router: ^13.2.0
  # 찜 목록 로컬 저장
  shared_preferences: ^2.2.3
  # 이미지 캐싱
  cached_network_image: ^3.3.1
  # 로딩 스켈레톤
  shimmer: ^3.0.0
  # 환경변수 (.env)
  flutter_dotenv: ^5.1.0
  # 지도
  flutter_map: ^6.1.0
  latlong2: ^0.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
